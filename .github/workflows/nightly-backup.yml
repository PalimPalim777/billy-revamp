name: nightly-backup

on:
  schedule:
    - cron: '17 2 * * *'        # 02:17 UTC nightly (off-the-hour; GH cron is best-effort)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-backup
  cancel-in-progress: false

env:
  # --- EDIT these three to match your B2 bucket (non-secret) ---
  B2_BUCKET: "billy-revamp-backups"
  B2_S3_ENDPOINT: "https://s3.eu-central-003.backblazeb2.com"
  AWS_DEFAULT_REGION: "eu-central-003"

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install age
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y age
          age --version

      - name: Dump public schema (pinned pg17 via docker; restorable; no owners/acls)
        run: |
          set -euo pipefail
          STAMP="$(date -u +%Y-%m-%dT%H%M%SZ)"
          echo "STAMP=${STAMP}" >> "$GITHUB_ENV"
          docker run --rm -e PGCONNECT_TIMEOUT=30 -v "$PWD:/out" -w /out postgres:17-alpine \
            pg_dump "${{ secrets.SUPABASE_DB_URL }}" \
              --schema=public --no-owner --no-acl --format=custom \
              --file="billy-${STAMP}.dump"
          test -s "billy-${STAMP}.dump"
          ls -l "billy-${STAMP}.dump"

      - name: Encrypt with age (operator + drill recipients)
        env:
          AGE_PUBLIC_KEY: ${{ secrets.AGE_PUBLIC_KEY }}
          AGE_PUBLIC_KEY_DRILL: ${{ secrets.AGE_PUBLIC_KEY_DRILL }}
        run: |
          set -euo pipefail
          # Encrypt to TWO recipients: operator (offline) + drill (restore-drill env).
          # Guard: a blank/missing recipient silently yields a dump the drill cannot
          # decrypt, producing false-green backups. Fail fast instead.
          test -n "$AGE_PUBLIC_KEY"       || { echo "FATAL: AGE_PUBLIC_KEY is empty"; exit 1; }
          test -n "$AGE_PUBLIC_KEY_DRILL" || { echo "FATAL: AGE_PUBLIC_KEY_DRILL is empty"; exit 1; }
          case "$AGE_PUBLIC_KEY"       in age1*) ;; *) echo "FATAL: AGE_PUBLIC_KEY not an age recipient"; exit 1 ;; esac
          case "$AGE_PUBLIC_KEY_DRILL" in age1*) ;; *) echo "FATAL: AGE_PUBLIC_KEY_DRILL not an age recipient"; exit 1 ;; esac
          {
            printf '%s\n' "$AGE_PUBLIC_KEY"
            printf '%s\n' "$AGE_PUBLIC_KEY_DRILL"
          } > recipients.txt
          test "$(grep -c . recipients.txt)" -eq 2 || { echo "FATAL: expected exactly 2 recipients"; exit 1; }
          age -R recipients.txt -o "billy-${STAMP}.dump.age" "billy-${STAMP}.dump"
          rm -f "billy-${STAMP}.dump" recipients.txt
          test -s "billy-${STAMP}.dump.age"

      - name: Upload to B2 (S3 API)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.B2_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APP_KEY }}
        run: |
          set -euo pipefail
          KEY="daily/billy-${STAMP}.dump.age"
          aws s3 cp "billy-${STAMP}.dump.age" "s3://${B2_BUCKET}/${KEY}" --endpoint-url "${B2_S3_ENDPOINT}"

      - name: Heartbeat success
        run: curl -fsS -m 10 --retry 3 "${{ secrets.HEALTHCHECK_URL }}"

      - name: Heartbeat failure
        if: failure()
        run: curl -fsS -m 10 --retry 3 "${{ secrets.HEALTHCHECK_URL }}/fail" || true
