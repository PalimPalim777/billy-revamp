<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#121214">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Billy">
  <link rel="apple-touch-icon" href="/icons/billy-180.png">
  <link rel="icon" href="/icons/billy.svg" type="image/svg+xml">
  <title>Billy — App</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
      background: #fafafa;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    main { max-width: 560px; width: 100%; text-align: center; }
    h1 { font-size: 24px; font-weight: 600; margin: 0 0 12px; letter-spacing: -0.02em; }
    h3 { font-size: 19px; font-weight: 600; margin: 0 0 8px; letter-spacing: -0.01em; }
    p { font-size: 16px; line-height: 1.5; color: #555; margin: 0 0 16px; }
    a { color: #111; font-size: 13px; }
    input[type="text"], input[type="password"], textarea {
      width: 100%; padding: 11px 12px; font-size: 15px; border: 1px solid #ddd;
      border-radius: 8px; margin: 0 0 10px; background: #fff; color: #111;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    textarea { resize: vertical; min-height: 64px; text-align: left; }
    button {
      padding: 12px 20px; background: #111; color: #fff; border: 0; border-radius: 8px;
      font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit;
    }
    button:hover:not(:disabled) { background: #000; }
    button:disabled { background: #999; cursor: not-allowed; }
    .row { display: flex; gap: 8px; align-items: center; justify-content: center; flex-wrap: wrap; }
    .toggle { background: transparent; color: #555; border: 1px solid #ddd; padding: 11px 12px; }
    .toggle:hover:not(:disabled) { background: #f0f0f0; }
    .toggle.active { background: #111; color: #fff; border-color: #111; }
    .err { color: #b00020; font-size: 14px; margin: 8px 0 12px; }
    .status { color: #888; font-size: 14px; margin: 8px 0 0; }
    .connected { color: #1a7f37; font-size: 14px; margin-top: 8px; }
    .view { display: none; }
    .view.active { display: block; }
    .cap-state { display: none; }
    .cap-state.active { display: block; }
    .hidden { display: none; }
    .mode-toggle { margin: 0 0 20px; }
    #loading { color: #888; font-size: 14px; }
    .small { font-size: 13px; margin-top: 18px; }
    .messages {
      text-align: left; max-height: 50vh; overflow-y: auto; border: 1px solid #eee;
      border-radius: 10px; padding: 12px; background: #fff; margin: 0 0 12px;
    }
    .msg { margin: 0 0 12px; }
    .msg:last-child { margin-bottom: 0; }
    .who { font-size: 12px; font-weight: 600; color: #999; margin-bottom: 2px; }
    .msg-body { font-size: 15px; line-height: 1.5; color: #222; white-space: pre-wrap; }
    .msg-billy .msg-body { color: #111; }
    .memo-card { text-align: left; border: 1px solid #e2e2e2; border-radius: 12px; padding: 18px; background: #fff; margin: 0 0 14px; }
    .bucket { display: inline-block; font-size: 12px; font-weight: 600; color: #444; border: 1px solid #ccc; border-radius: 999px; padding: 2px 10px; margin: 0 0 12px; }
    .memo-body { font-size: 15px; line-height: 1.55; color: #222; white-space: pre-wrap; margin: 0 0 12px; }
    .memo-summary { font-size: 13px; font-style: italic; color: #777; margin: 0 0 8px; }
    .memo-tags { font-size: 13px; color: #555; margin: 0 0 8px; }
    .memo-time { font-size: 12px; color: #888; }
    .memo-links { margin: 8px 0 0; }
    .memo-links-label { font-size: 13px; color: #555; margin: 0 0 6px; }
    .memo-link { display: inline-block; font-size: 13px; color: #1a6fc4; border: 1px solid #ccc; border-radius: 999px; padding: 2px 10px; margin: 0 6px 6px 0; text-decoration: none; }
    .memo-link:hover { background: #f0f0f0; }
    /* shell-frame: fixed top bar + scrollable content column. body.app-shell beats
       foundation's `body` by specificity, so it overrides the centering + padding cleanly. */
    body.app-shell {
      display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh;
      padding: 0; align-items: stretch; justify-content: flex-start;
    }
    .app-bar {
      flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between;
      height: 52px; padding: 0 8px; padding-top: env(safe-area-inset-top, 0px);
      background: var(--surface); border-bottom: 1px solid var(--separator);
    }
    .app-bar-title { font-size: 17px; font-weight: 600; color: var(--text); }
    .app-bar-btn {
      background: transparent; border: 0; padding: 8px; width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center; color: var(--text-2);
      border-radius: 999px; cursor: pointer;
    }
    .app-bar-btn:active { background: var(--surface-2); }
    .app-bar.hidden { display: none; }
    main {
      flex: 1 1 auto; overflow-y: auto; width: 100%; max-width: 560px; margin: 0 auto;
      padding: 16px 16px calc(16px + env(safe-area-inset-bottom, 0px)); box-sizing: border-box;
    }
    /* unified-toggle-shell: persistent bottom input row (toggle · input · send). A flex child of
       body.app-shell, so it sits below the scrollable <main> with no overlap; shown only on the
       authenticated capture surface (toggled with the top bar in show()). */
    .input-bar {
      flex: 0 0 auto; background: var(--bg); border-top: 1px solid var(--separator);
      padding: 8px 8px calc(8px + env(safe-area-inset-bottom, 0px));
    }
    .input-bar.hidden { display: none; }
    .input-bar-inner {
      display: flex; align-items: center; gap: 8px; width: 100%; max-width: 560px; margin: 0 auto;
    }
    .mode-btn {
      flex: 0 0 auto; width: 44px; height: 44px; border-radius: 999px; padding: 0;
      display: flex; align-items: center; justify-content: center;
      background: #252525; border: 1px solid #333; color: var(--text-2); cursor: pointer;
    }
    .mode-btn:active { transform: scale(0.96); }
    .mode-btn.retrieve { border-color: #4a6a8a; color: #7aaadd; }
    .mode-btn .icon-search { display: none; }
    .mode-btn.retrieve .icon-pencil { display: none; }
    .mode-btn.retrieve .icon-search { display: block; }
    .bar-input {
      flex: 1 1 auto; min-width: 0; height: 44px; padding: 0 16px; border-radius: 999px;
      background: var(--surface); color: var(--text); border: 1px solid transparent; font-size: 16px;
    }
    .bar-input:focus { outline: none; border-color: var(--separator); }
    .send-btn {
      flex: 0 0 auto; width: 44px; height: 44px; border-radius: 999px; padding: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface-2); color: var(--text); border: 0; cursor: pointer;
    }
    .send-btn:active:not(:disabled) { transform: scale(0.96); }
    .send-btn:disabled, .bar-input:disabled { opacity: 0.5; cursor: not-allowed; }
    /* the bar now owns capture's conversational input; hide the legacy in-column textarea + Send
       (End & synthesize stays; capture-as-chat re-skins this surface next). */
    #captureInput, #sendBtn { display: none; }
  </style>
  <link rel="stylesheet" href="/styles/foundation.css">
</head>
<body class="app-shell">
  <header class="app-bar hidden" id="appBar">
    <button class="app-bar-btn" id="menuBtn" aria-label="Menu" type="button">
      <svg width="20" height="20" viewBox="0 0 20 20" aria-hidden="true">
        <line x1="2" y1="5" x2="18" y2="5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="2" y1="10" x2="18" y2="10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="2" y1="15" x2="18" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    <span class="app-bar-title">Billy</span>
    <button class="app-bar-btn" id="clearBtn" aria-label="Sign out" type="button">
      <!-- Temporary Sign out (was the deferred trash/clear placeholder). The menu drawer (#4) will
           own Sign out; this reverts to its deferred top-right role then. -->
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <path d="M8 17H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M13 14l4-4-4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M17 10H8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>
  </header>
  <main>
    <div id="loading">Loading…</div>

    <section id="onboardView" class="view">
      <h1>Connect your Anthropic API key</h1>
      <p>Billy uses your own Anthropic key. It's encrypted on your device and we only
        ever store the ciphertext — never the key itself.</p>
      <div class="row">
        <input id="keyInput" type="password" autocomplete="off" autocapitalize="none"
               spellcheck="false" placeholder="sk-ant-...">
        <button id="toggleKey" class="toggle" type="button">Show</button>
      </div>
      <div><button id="saveBtn" disabled>Validate &amp; save</button></div>
      <p id="onboardStatus" class="status" style="display:none"></p>
      <p id="onboardErr" class="err" style="display:none"></p>
    </section>

    <section id="captureView" class="view">
      <!-- Mode toggle moved to the unified bottom input row (see #inputBar / #modeBtn). -->

      <!-- Capture surface, wrapped only. Its markup, element IDs and event
           bindings are unchanged; the wrapper just lets it be hidden/shown on a
           mode switch without ever being destroyed or re-rendered. -->
      <div id="capture-mode">
      <!-- Empty initial state: capture lands here as a blank scrollback and the bottom bar is
           ready. Typing + send auto-starts the capture (loads prompts → 'capturing'). The old
           "Start capture / key-connected / Sign out" entry screen is gone; Sign out is temporarily
           on the top-bar button until the menu drawer (#4) takes it over. -->
      <div id="st-entry" class="cap-state"></div>

      <div id="st-capturing" class="cap-state">
        <div id="messages" class="messages"></div>
        <textarea id="captureInput" rows="3"
          placeholder="Type your thought… (Enter to send, Shift+Enter for a newline)"></textarea>
        <div class="row">
          <button id="sendBtn">Send</button>
          <button id="endBtn" disabled>End conversation &amp; synthesize</button>
        </div>
        <p class="small"><a id="cancelLink" href="#">Cancel</a></p>
      </div>

      <div id="st-synthesizing" class="cap-state">
        <p>Synthesizing your memo…</p>
      </div>

      <div id="st-memo" class="cap-state">
        <div id="memoCard" class="memo-card"></div>
        <p id="saveErr" class="err" style="display:none"></p>
        <div class="row">
          <button id="saveMemoBtn">Save memo</button>
          <button id="discardBtn">Discard &amp; new capture</button>
        </div>
      </div>

      <div id="st-saved" class="cap-state">
        <div id="savedCard" class="memo-card"></div>
        <p class="connected">Saved ✓</p>
        <p id="embedStatus" class="small" style="display:none"></p>
        <p id="blobStatus" class="small" style="display:none"></p>
        <div><button id="captureAgainBtn">Capture again</button></div>
      </div>

      <div id="st-error" class="cap-state">
        <p id="errorMsg" class="err"></p>
        <div><button id="retryBtn" style="display:none">Retry</button></div>
        <p class="small"><a id="errBack" href="#">Back</a></p>
      </div>
      </div>

      <!-- Retrieve surface. Hidden by default (Capture is the default mode).
           Mounted lazily on first switch to Retrieve via dynamic import. -->
      <div id="retrieve-mode" class="hidden"></div>
    </section>
  </main>
  <footer class="input-bar hidden" id="inputBar">
    <div class="input-bar-inner">
      <button class="mode-btn" id="modeBtn" type="button" aria-label="Switch to retrieve">
        <svg class="icon-pencil" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M14.06 2.94a1.5 1.5 0 0 1 2.12 0l.88.88a1.5 1.5 0 0 1 0 2.12L7.5 15.5l-3.5 1 1-3.5 9.06-9.06z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        <svg class="icon-search" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <circle cx="9" cy="9" r="5.5" stroke="currentColor" stroke-width="1.6"/>
          <path d="M13.2 13.2L17 17" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>
      <input class="bar-input" id="barInput" type="text" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="What's on your mind?">
      <button class="send-btn" id="barSend" type="button" aria-label="Send">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M17 3L9 11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M17 3l-5.5 14-3-6-6-3L17 3z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </footer>

  <script type="module">
    import { getSessionDEK, clearSessionDEK } from '/crypto/session-dek.js';
    import { encryptStringWithDEK, decryptStringWithDEK } from '/crypto/dek.js';
    import { BILLY_MODEL, callLLM } from './lib/llm.js';
    import { setAnthropicKey, getAnthropicKey, clearAnthropicKey } from './lib/session.js';
    import { loadCapturePromptV1 } from './lib/prompts-loader.js';
    import { saveMemo, saveEmbedding, fetchOtherEmbeddings, saveConnectionBlob } from './lib/memos.js';
    import {
      startLoadingEmbeddingModel,
      isEmbeddingModelReady,
      embedMemo,
      base64ToFloat32Array,
      topKNeighbors,
      SCORING_FN_VERSION,
      EMBEDDING_MODEL_VERSION
    } from './lib/embeddings.js';

    const loading = document.getElementById('loading');
    const onboardView = document.getElementById('onboardView');
    const captureView = document.getElementById('captureView');

    function show(view) {
      loading.style.display = 'none';
      onboardView.classList.remove('active');
      captureView.classList.remove('active');
      view.classList.add('active');
      // The top bar AND the bottom input row are chrome for the authenticated capture screen
      // only — hide both during #loading / #onboardView. show() receives the view ELEMENT.
      const onApp = (view === captureView);
      document.getElementById('appBar').classList.toggle('hidden', !onApp);
      document.getElementById('inputBar').classList.toggle('hidden', !onApp);
    }

    // ----- Capture flow -----
    const capStates = {
      entry: document.getElementById('st-entry'),
      capturing: document.getElementById('st-capturing'),
      synthesizing: document.getElementById('st-synthesizing'),
      memo: document.getElementById('st-memo'),
      saved: document.getElementById('st-saved'),
      error: document.getElementById('st-error')
    };
    const messagesEl = document.getElementById('messages');
    const captureInput = document.getElementById('captureInput');
    const sendBtn = document.getElementById('sendBtn');
    const endBtn = document.getElementById('endBtn');
    const memoCardEl = document.getElementById('memoCard');
    const savedCardEl = document.getElementById('savedCard');
    const embedStatusEl = document.getElementById('embedStatus');
    const blobStatusEl = document.getElementById('blobStatus');
    const saveMemoBtn = document.getElementById('saveMemoBtn');
    const saveErr = document.getElementById('saveErr');
    const errorMsgEl = document.getElementById('errorMsg');
    const retryBtn = document.getElementById('retryBtn');

    let history = [];
    let companionPrompt = null;
    let synthesisPrompt = null;
    let pendingRetry = null;
    let captureContext = null;
    let currentCapState = 'entry'; // mirrors the active cap-state so the bottom bar can route sends

    function setCaptureState(s) {
      currentCapState = s;
      for (const k in capStates) capStates[k].classList.remove('active');
      capStates[s].classList.add('active');
    }

    function enterEntry() {
      history = [];
      captureContext = null;
      setCaptureState('entry'); // 'entry' is now an empty scrollback; the bar auto-starts on first send
      show(captureView);
    }

    function renderMessages() {
      messagesEl.innerHTML = '';
      for (const m of history) {
        const wrap = document.createElement('div');
        wrap.className = 'msg ' + (m.role === 'user' ? 'msg-user' : 'msg-billy');
        const who = document.createElement('div');
        who.className = 'who';
        who.textContent = m.role === 'user' ? 'You' : 'Billy';
        const body = document.createElement('div');
        body.className = 'msg-body';
        body.textContent = m.content; // textContent: never interpret model/user text as HTML
        wrap.appendChild(who);
        wrap.appendChild(body);
        messagesEl.appendChild(wrap);
      }
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setControls(busy) {
      const hasUser = history.some(m => m.role === 'user');
      captureInput.disabled = busy; // hidden, kept as the capture-busy proxy read on a mode switch
      sendBtn.disabled = busy;      // hidden
      endBtn.disabled = busy || !hasUser;
      setBarEnabled(!busy);         // the bottom bar is capture's live input now
    }

    function errorInfo(code) {
      if (code === 'LLM_NO_KEY') return { msg: "Your Anthropic key isn't available — please sign out and back in.", retry: false };
      if (code === 'LLM_AUTH') return { msg: "Your Anthropic key was rejected. It may have been revoked or rotated.", retry: false };
      if (code === 'LLM_RATELIMIT') return { msg: "Rate-limited by Anthropic. Wait a moment and try again.", retry: true };
      if (code.startsWith('LLM_HTTP_')) return { msg: `Request failed (HTTP ${code.slice(9)}). Try again.`, retry: true };
      if (code.startsWith('PROMPT_FETCH_')) return { msg: `Couldn't load the capture prompt (HTTP ${code.slice(13)}). Refresh the page.`, retry: false };
      if (code === 'PROMPT_PARSE') return { msg: "Capture prompt file is malformed. Refresh; report if it persists.", retry: false };
      if (code === 'SYNTH_PARSE') return { msg: "Couldn't parse the synthesized memo. Try ending the conversation again.", retry: true };
      // Uncaught fetch rejection (network failure) surfaces here as a TypeError.
      return { msg: "Couldn't reach Anthropic — check your connection and try again.", retry: true };
    }

    function enterError(err, retryAction) {
      const code = (err && err.message) ? err.message : '';
      const info = errorInfo(code);
      errorMsgEl.textContent = info.msg;
      if (info.retry && retryAction) {
        pendingRetry = retryAction;
        retryBtn.style.display = 'inline-block';
      } else {
        pendingRetry = null;
        retryBtn.style.display = 'none';
      }
      setCaptureState('error');
    }

    async function startCapture() {
      // Begin loading the embedding model in parallel with the conversation.
      // Fire-and-forget: a load failure must not break capture (embedding is a follow-up).
      startLoadingEmbeddingModel().catch(err => console.warn('[embeddings] background load failed:', err));
      try {
        const p = await loadCapturePromptV1();
        companionPrompt = p.companion;
        synthesisPrompt = p.synthesis;
      } catch (err) {
        enterError(err, null);
        return;
      }
      history = [];
      renderMessages();
      setCaptureState('capturing');
      setControls(false);
      barInput.focus();
    }

    async function requestAssistantReply() {
      setCaptureState('capturing');
      renderMessages();
      setControls(true);
      try {
        const billyText = await callLLM({ messages: history, system: companionPrompt });
        history.push({ role: 'assistant', content: billyText });
        renderMessages();
        setControls(false);
        barInput.focus();
      } catch (err) {
        enterError(err, requestAssistantReply);
      }
    }

    function doSend() {
      if (captureInput.disabled) return;
      const text = captureInput.value.trim();
      if (!text) return;
      history.push({ role: 'user', content: text });
      captureInput.value = '';
      renderMessages();
      requestAssistantReply();
    }

    // Send a capture turn from arbitrary text (the unified bottom bar feeds this). Mirrors doSend
    // but takes the text as a param instead of reading the now-hidden in-column textarea.
    function captureSendText(text) {
      history.push({ role: 'user', content: text });
      renderMessages();
      requestAssistantReply();
    }

    // Deterministic URL extraction from the conversation transcript. Forward-only: this is a
    // client-side addition appended after JSON.parse — old memos simply have no links field.
    // Returns an array of { url } in first-seen order, deduped.
    function extractLinks(text) {
      const matches = (text || '').match(/\bhttps?:\/\/[^\s<>"')\]]+/gi) || [];
      const seen = new Set();
      const links = [];
      for (const url of matches) {
        if (seen.has(url)) continue;
        seen.add(url);
        links.push({ url });
      }
      return links;
    }

    // Remove the extracted URLs from the body so the embedding stays URL-free, then lightly clean
    // the artifacts the removal leaves behind. Touches nothing that isn't a removed-url leftover.
    function stripUrlsFromBody(body, links) {
      let cleaned = body || '';
      for (const link of links) {
        cleaned = cleaned.split(link.url).join('');
      }
      cleaned = cleaned
        .replace(/[ \t]+/g, ' ')        // collapse runs of spaces/tabs to a single space
        .replace(/ ([.,;:!?])/g, '$1')  // drop a space left immediately before punctuation
        .replace(/[ \t]+$/gm, '');      // trim trailing whitespace on each line
      return cleaned;
    }

    async function doSynthesize() {
      setCaptureState('synthesizing');
      try {
        const transcript = history.map(m => `${m.role === 'user' ? 'User' : 'Billy'}: ${m.content}`).join('\n\n');
        const synthMessages = [{
          role: 'user',
          content: `Conversation transcript:\n\n${transcript}\n\nExisting canonical tag vocabulary: []\n\nOutput the Memo as bare JSON, no preamble.`
        }];
        const out = await callLLM({ messages: synthMessages, system: synthesisPrompt, maxTokens: 4096 });
        let memo;
        try {
          memo = JSON.parse(out);
        } catch {
          enterError(new Error('SYNTH_PARSE'), doSynthesize);
          return;
        }
        // Client-side links layer: extract URLs from the user's own turns, attach them to the memo
        // (rides inside memo_ciphertext when saved — no new field/column), and strip them from the
        // body so the embedding stays URL-free. The LLM still returns the exact v1 schema.
        const userText = history.filter(m => m.role === 'user').map(m => m.content).join('\n');
        memo.links = extractLinks(userText);
        if (memo.links.length) memo.body = stripUrlsFromBody(memo.body || '', memo.links);
        captureContext = { memo, promptVersion: 'lifeos-capture-v1' };
        saveErr.style.display = 'none';
        saveMemoBtn.disabled = false;
        saveMemoBtn.textContent = 'Save memo';
        renderMemo(memo, memoCardEl);
        setCaptureState('memo');
      } catch (err) {
        enterError(err, doSynthesize);
      }
    }

    function renderMemo(memo, target) {
      const memoCardEl = target;
      memoCardEl.innerHTML = '';

      const h3 = document.createElement('h3');
      h3.textContent = memo.title || '';
      memoCardEl.appendChild(h3);

      if (memo.para_bucket) {
        const bucket = document.createElement('span');
        bucket.className = 'bucket';
        bucket.textContent = memo.para_bucket;
        memoCardEl.appendChild(bucket);
      }

      const body = document.createElement('div');
      body.className = 'memo-body';
      body.textContent = memo.body || '';
      memoCardEl.appendChild(body);

      if (memo.summary) {
        const summary = document.createElement('div');
        summary.className = 'memo-summary';
        summary.textContent = memo.summary;
        memoCardEl.appendChild(summary);
      }

      if (Array.isArray(memo.tags) && memo.tags.length > 0) {
        const tags = document.createElement('div');
        tags.className = 'memo-tags';
        tags.textContent = memo.tags.join(' · ');
        memoCardEl.appendChild(tags);
      }

      if (memo.time_reference !== null && memo.time_reference !== undefined && memo.time_reference !== '') {
        const time = document.createElement('div');
        time.className = 'memo-time';
        time.textContent = 'Time: ' + memo.time_reference;
        memoCardEl.appendChild(time);
      }

      // Linked sources: render the client-extracted URLs as pills. textContent ONLY (never
      // innerHTML) so a hostile URL/label can never inject markup. Forward-only — absent on old memos.
      if (Array.isArray(memo.links) && memo.links.length) {
        const linksEl = document.createElement('div');
        linksEl.className = 'memo-links';

        const label = document.createElement('div');
        label.className = 'memo-links-label';
        label.textContent = 'Linked sources';
        linksEl.appendChild(label);

        for (const { url, label: linkLabel } of memo.links) {
          const a = document.createElement('a');
          a.className = 'memo-link';
          a.href = url;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.textContent = linkLabel || domainOf(url);
          linksEl.appendChild(a);
        }

        memoCardEl.appendChild(linksEl);
      }
    }

    // Display label for a link pill: the bare hostname (www. stripped), or the raw url if unparseable.
    function domainOf(url) {
      try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return url; }
    }

    function showEmbeddingStatus(state) {
      const map = {
        embedding: { text: 'Embedding…', color: '#8e8e93' },
        embedded: { text: 'Embedded ✓', color: '#30d158' },
        pending: { text: 'Embedding pending — will retry', color: '#ff9f0a' }
      };
      const s = map[state];
      if (!s) { embedStatusEl.style.display = 'none'; return; }
      embedStatusEl.textContent = s.text;
      embedStatusEl.style.color = s.color;
      embedStatusEl.style.display = 'block';
    }

    function showBlobStatus(state, n) {
      let text, color;
      if (state === 'connecting') { text = 'Connecting…'; color = '#8e8e93'; }
      else if (state === 'connected') {
        text = (n && n > 0) ? `Connected to ${n} neighbor(s) ✓` : 'Connected (first memo) ✓';
        color = '#30d158';
      } else if (state === 'pending') { text = 'Connection pending — will retry'; color = '#ff9f0a'; }
      else { blobStatusEl.style.display = 'none'; return; }
      blobStatusEl.textContent = text;
      blobStatusEl.style.color = color;
      blobStatusEl.style.display = 'block';
    }

    async function embedAndConnectAndSave(memoId, memo) {
      showEmbeddingStatus('embedding');
      let vec;
      try {
        vec = await embedMemo(memo);
        await saveEmbedding(memoId, vec, EMBEDDING_MODEL_VERSION);
        showEmbeddingStatus('embedded');
      } catch (err) {
        console.warn('[embeddings] failed:', err);
        showEmbeddingStatus('pending');
        return; // No point computing the blob without an embedding for the new memo.
      }

      // Now compute the connection blob.
      showBlobStatus('connecting');
      try {
        const others = await fetchOtherEmbeddings(memoId);

        if (others.length === 0) {
          // First memo for this user; empty neighbors array is correct.
          const blob = { neighbors: [], scoring_fn_version: SCORING_FN_VERSION };
          await saveConnectionBlob(memoId, blob, SCORING_FN_VERSION);
          showBlobStatus('connected', 0);
          return;
        }

        // Decrypt each other memo's embedding. If any decrypt fails, skip that one
        // (it's a corrupted row, not a fatal error for this memo).
        const dek = await getSessionDEK();
        if (!dek) { showBlobStatus('pending'); return; }

        const neighbors = [];
        for (const m of others) {
          try {
            const plaintext_b64 = await decryptStringWithDEK(m.embedding_ciphertext, m.embedding_iv, dek);
            const otherVec = base64ToFloat32Array(plaintext_b64);
            neighbors.push({ id: m.id, vec: otherVec });
          } catch (decryptErr) {
            console.warn('[blob] decrypt failed for memo', m.id, decryptErr);
            // Skip this one. The blob remains valid with fewer neighbors.
          }
        }

        const top = topKNeighbors(vec, neighbors);
        const blob = { neighbors: top, scoring_fn_version: SCORING_FN_VERSION };
        await saveConnectionBlob(memoId, blob, SCORING_FN_VERSION);
        showBlobStatus('connected', top.length);
      } catch (err) {
        console.warn('[blob] failed:', err);
        showBlobStatus('pending');
      }
    }

    function showSaveError(err) {
      const code = (err && err.message) ? err.message : '';
      let msg;
      if (code === 'MEMO_NO_DEK' || code === 'MEMO_AUTH') {
        msg = 'Your session expired. Please re-unlock.';
      } else if (code.startsWith('MEMO_BAD_INPUT_')) {
        msg = `Memo failed validation (${code.slice(15)}). Report if it persists.`;
      } else if (code === 'MEMO_ID_CONFLICT') {
        msg = 'Save failed twice with ID conflict — try again.';
      } else if (code.startsWith('MEMO_HTTP_')) {
        msg = `Save failed (HTTP ${code.slice(10)}). Try again.`;
      } else {
        msg = 'Save failed — check your connection and try again.';
      }
      saveErr.textContent = msg;
      saveErr.style.display = 'block';
    }

    async function doSaveMemo() {
      if (!captureContext || saveMemoBtn.disabled) return;
      saveErr.style.display = 'none';
      saveMemoBtn.disabled = true;
      saveMemoBtn.textContent = 'Saving…';
      try {
        let saved;
        try {
          saved = await saveMemo(captureContext.memo, captureContext.promptVersion);
        } catch (err) {
          // Transparent single retry with a fresh UUID (saveMemo mints a new one each call).
          if (err && err.message === 'MEMO_ID_CONFLICT') {
            saved = await saveMemo(captureContext.memo, captureContext.promptVersion);
          } else {
            throw err;
          }
        }
        renderMemo(captureContext.memo, savedCardEl);
        showEmbeddingStatus(null);
        showBlobStatus(null);
        setCaptureState('saved');
        // Embedding + connection-blob run AFTER the visible "Saved ✓" so they never block perceived save.
        embedAndConnectAndSave(saved.id, captureContext.memo);
      } catch (err) {
        saveMemoBtn.disabled = false;
        saveMemoBtn.textContent = 'Save memo';
        showSaveError(err);
      }
    }

    // Capture listeners (wired once; elements always present in the DOM).
    saveMemoBtn.addEventListener('click', doSaveMemo);
    document.getElementById('captureAgainBtn').addEventListener('click', enterEntry);
    sendBtn.addEventListener('click', doSend);
    endBtn.addEventListener('click', () => { if (!endBtn.disabled) doSynthesize(); });
    captureInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
    });
    document.getElementById('cancelLink').addEventListener('click', (e) => { e.preventDefault(); enterEntry(); });
    document.getElementById('discardBtn').addEventListener('click', enterEntry);
    document.getElementById('errBack').addEventListener('click', (e) => { e.preventDefault(); enterEntry(); });
    retryBtn.addEventListener('click', () => { if (pendingRetry) pendingRetry(); });

    // Temporary top-bar Sign out (the #clearBtn button); moves into the menu drawer in #4.
    document.getElementById('clearBtn').addEventListener('click', (e) => {
      e.preventDefault();
      clearAnthropicKey();
      clearSessionDEK();
      window.location.href = '/api/auth/logout';
    });

    // ----- Unified mode toggle (one round button in the bottom input row) -----
    // The toggle flips the whole surface between capture and retrieve: it swaps the two
    // scrollbacks (each keeps its own scroll position), swaps the button icon + accent + the
    // shared input's placeholder, and routes the shared input's submit to the active mode.
    // Retrieve is still mounted lazily on first switch; nothing here touches the key, DEK,
    // embedding model, LLM, or network. Capture state survives a round-trip (DOM is only
    // hidden/shown, never re-rendered). The bottom bar is now capture's live conversational
    // input (the in-column textarea is hidden) AND retrieve's query input (decoupled from
    // retrieve-ui.js, which no longer mounts its own row — it exposes submitQuery instead).
    const modeBtn = document.getElementById('modeBtn');
    const barInput = document.getElementById('barInput');
    const barSend = document.getElementById('barSend');
    const captureModeView = document.getElementById('capture-mode');
    const retrieveModeView = document.getElementById('retrieve-mode');
    const scrollEl = document.querySelector('main');

    let currentMode = 'capture';
    let retrieveMounted = false;
    let retrieveController = null;            // { submitQuery, isBusy } from mountRetrieve
    let captureScroll = 0;
    let retrieveScroll = 0;
    let retrievePlaceholder = 'What are you looking for?'; // reframes to "Respond to this thread…" after turn 1

    // Enable/disable the bottom bar, but only while it belongs to capture (retrieve drives its own
    // busy state via onBusyChange). Guards against a capture request that finishes after the user
    // has already toggled to retrieve.
    function setBarEnabled(enabled) {
      if (currentMode !== 'capture') return;
      barInput.disabled = !enabled;
      barSend.disabled = !enabled;
    }

    function applyModeChrome(mode) {
      if (mode === 'capture') {
        modeBtn.classList.remove('retrieve');
        modeBtn.setAttribute('aria-label', 'Switch to retrieve');
        barInput.placeholder = "What's on your mind?";
      } else {
        modeBtn.classList.add('retrieve');
        modeBtn.setAttribute('aria-label', 'Switch to capture');
        barInput.placeholder = retrievePlaceholder;
      }
    }

    function ensureRetrieveMounted() {
      if (retrieveMounted) return Promise.resolve();
      retrieveMounted = true;                 // set before await so a rapid 2nd switch can't double-mount
      return import('/lib/retrieve/retrieve-ui.js').then(mod => {
        retrieveController = mod.mountRetrieve(retrieveModeView, {
          onBusyChange: (b) => { if (currentMode === 'retrieve') { barInput.disabled = b; barSend.disabled = b; } },
          onPlaceholderChange: (text) => { retrievePlaceholder = text; if (currentMode === 'retrieve') barInput.placeholder = text; }
        });
      }).catch(err => {
        retrieveMounted = false;              // allow a retry on a later switch
        retrieveModeView.innerHTML = '';      // never leave the panel blank
        const p = document.createElement('p');
        p.className = 'err';
        p.textContent = "Couldn't load Retrieve. Refresh and try again.";
        retrieveModeView.appendChild(p);
      });
    }

    function switchToCapture() {
      if (currentMode === 'capture') return;
      retrieveScroll = scrollEl.scrollTop;
      retrieveModeView.classList.add('hidden');
      captureModeView.classList.remove('hidden');
      currentMode = 'capture';
      applyModeChrome('capture');
      barInput.value = '';
      const busy = captureInput.disabled;     // capture-busy proxy maintained by setControls
      barInput.disabled = busy; barSend.disabled = busy;
      scrollEl.scrollTop = captureScroll;
      barInput.focus();
    }

    function switchToRetrieve() {
      if (currentMode === 'retrieve') return;
      captureScroll = scrollEl.scrollTop;
      captureModeView.classList.add('hidden');
      retrieveModeView.classList.remove('hidden');
      currentMode = 'retrieve';
      applyModeChrome('retrieve');
      barInput.value = '';
      scrollEl.scrollTop = retrieveScroll;
      if (!retrieveMounted) {
        barInput.disabled = true; barSend.disabled = true;   // until the module + UI are ready
        ensureRetrieveMounted().then(() => {
          if (currentMode === 'retrieve') { barInput.disabled = false; barSend.disabled = false; barInput.focus(); }
        });
      } else {
        const busy = retrieveController ? retrieveController.isBusy() : false;
        barInput.disabled = busy; barSend.disabled = busy;
        barInput.focus();
      }
    }

    // Capture-mode send from the bottom bar: auto-start a capture on the first send (entry),
    // otherwise push a turn. Other cap-states (synthesizing/memo/saved/error) leave the typed text
    // in place and do nothing, so it is never silently lost.
    async function captureBarSend() {
      if (barInput.disabled) return;
      const text = barInput.value.trim();
      if (!text) return;
      if (currentCapState === 'entry') {
        barInput.value = '';
        await startCapture();                 // transitions to 'capturing' (or 'error')
        if (currentCapState !== 'capturing') return;
        captureSendText(text);
      } else if (currentCapState === 'capturing') {
        barInput.value = '';
        captureSendText(text);
      }
    }

    function barSendAction() {
      if (currentMode === 'capture') { captureBarSend(); return; }
      if (barInput.disabled) return;
      const text = barInput.value.trim();
      if (!text) return;
      barInput.value = '';
      if (retrieveController) retrieveController.submitQuery(text);
    }

    modeBtn.addEventListener('click', () => { if (currentMode === 'capture') switchToRetrieve(); else switchToCapture(); });
    barSend.addEventListener('click', barSendAction);
    barInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); barSendAction(); }
    });

    // Paint the initial (capture) chrome.
    applyModeChrome('capture');

    // ----- Load flow -----
    let dek = null;
    let wrapped = null;

    try {
      const me = await fetch('/api/me', { credentials: 'same-origin' }).then(r => r.json());
      if (!me || !me.authenticated) { window.location.replace('/'); throw 0; }

      wrapped = await fetch('/api/crypto/get-wrapped', { credentials: 'same-origin' }).then(r => r.json());
      if (wrapped && wrapped.setup_complete === false) { window.location.replace('/setup'); throw 0; }

      dek = await getSessionDEK();
      if (dek === null) { window.location.replace('/unlock'); throw 0; }
    } catch (e) {
      if (e !== 0) { loading.textContent = 'Failed to load. Refresh to retry.'; }
      throw e;
    }

    // Already onboarded: decrypt the wrapped key into memory and skip the prompt.
    if (wrapped.onboarding_complete && wrapped.anthropic_key_wrapped && wrapped.anthropic_key_iv) {
      try {
        const plain = await decryptStringWithDEK(
          wrapped.anthropic_key_wrapped,
          wrapped.anthropic_key_iv,
          dek
        );
        setAnthropicKey(plain);
        enterEntry();
      } catch {
        // Wrapped key present but undecryptable with this DEK — fall back to onboarding.
        clearAnthropicKey();
        setupOnboarding();
      }
    } else {
      setupOnboarding();
    }

    function setupOnboarding() {
      const keyInput = document.getElementById('keyInput');
      const saveBtn = document.getElementById('saveBtn');
      const toggleKey = document.getElementById('toggleKey');
      const statusEl = document.getElementById('onboardStatus');
      const errEl = document.getElementById('onboardErr');

      keyInput.addEventListener('input', () => {
        saveBtn.disabled = keyInput.value.trim().length === 0;
      });

      toggleKey.addEventListener('click', () => {
        const showing = keyInput.type === 'text';
        keyInput.type = showing ? 'password' : 'text';
        toggleKey.textContent = showing ? 'Show' : 'Hide';
      });

      async function validateAndSave() {
        const key = keyInput.value.trim();
        if (!key) return;
        errEl.style.display = 'none';
        statusEl.style.display = 'block';
        statusEl.textContent = 'Validating against ' + BILLY_MODEL + '…';
        saveBtn.disabled = true;

        // Validate with a real, minimal call DIRECTLY from the browser to Anthropic.
        // This is a credentials check, not a brain-layer call — it stays a direct fetch,
        // not routed through callLLM. The plaintext key never touches our server.
        let r;
        try {
          r = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
              'content-type': 'application/json',
              'x-api-key': key,
              'anthropic-version': '2023-06-01',
              'anthropic-dangerous-direct-browser-access': 'true'
            },
            body: JSON.stringify({
              model: BILLY_MODEL,
              max_tokens: 1,
              messages: [{ role: 'user', content: 'hi' }]
            })
          });
        } catch {
          statusEl.style.display = 'none';
          errEl.textContent = "Couldn't validate the key (network error) — check your connection and try again.";
          errEl.style.display = 'block';
          saveBtn.disabled = keyInput.value.trim().length === 0;
          return;
        }

        if (r.status === 401 || r.status === 403) {
          statusEl.style.display = 'none';
          errEl.textContent = 'That API key was rejected — check it and try again.';
          errEl.style.display = 'block';
          saveBtn.disabled = keyInput.value.trim().length === 0;
          return;
        }

        if (!r.ok) {
          statusEl.style.display = 'none';
          errEl.textContent = "Couldn't validate the key (status " + r.status + ") — check your connection and try again.";
          errEl.style.display = 'block';
          saveBtn.disabled = keyInput.value.trim().length === 0;
          return;
        }

        // Valid key. Encrypt with the DEK and persist ONLY the ciphertext.
        statusEl.textContent = 'Saving…';
        let saveRes;
        try {
          const { ciphertext_b64, iv_b64 } = await encryptStringWithDEK(key, dek);
          saveRes = await fetch('/api/account/set-anthropic-key', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({
              anthropic_key_wrapped: ciphertext_b64,
              anthropic_key_iv: iv_b64
            })
          });
        } catch {
          statusEl.style.display = 'none';
          errEl.textContent = "Couldn't save the key — check your connection and try again.";
          errEl.style.display = 'block';
          saveBtn.disabled = keyInput.value.trim().length === 0;
          return;
        }

        if (!saveRes.ok) {
          statusEl.style.display = 'none';
          errEl.textContent = "Couldn't save the key (status " + saveRes.status + ") — please try again.";
          errEl.style.display = 'block';
          saveBtn.disabled = keyInput.value.trim().length === 0;
          return;
        }

        // Keep plaintext key in module memory only; route to the capture entry.
        setAnthropicKey(key);
        keyInput.value = '';
        enterEntry();
      }

      saveBtn.addEventListener('click', validateAndSave);
      keyInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !saveBtn.disabled) validateAndSave();
      });

      show(onboardView);
    }
  </script>
</body>
</html>
