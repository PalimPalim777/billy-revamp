<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111111">
  <title>Billy — App</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
      background: #fafafa;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    main {
      max-width: 480px;
      text-align: center;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin: 0 0 12px;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 16px;
      line-height: 1.5;
      color: #555;
      margin: 0 0 16px;
    }
    a { color: #111; }
    #content { display: none; }
    #vault-line { display: none; }
  </style>
</head>
<body>
  <main id="content">
    <h1 id="signed-in">Signed in</h1>
    <p>Account identity established. Milestone 1.2.</p>
    <p id="vault-line">Vault unlocked. Milestone 1.3.</p>
    <p><a id="signout" href="/api/auth/logout">Sign out</a></p>
  </main>
  <script type="module">
    import { getSessionDEK, clearSessionDEK } from '/crypto/session-dek.js';

    document.getElementById('signout').addEventListener('click', (e) => {
      e.preventDefault();
      clearSessionDEK();
      window.location.href = '/api/auth/logout';
    });

    try {
      const me = await fetch('/api/me', { credentials: 'same-origin' }).then(r => r.json());
      if (!me || !me.authenticated) {
        window.location.replace('/');
        throw 0;
      }
      const wrapped = await fetch('/api/crypto/get-wrapped', { credentials: 'same-origin' }).then(r => r.json());
      if (wrapped && wrapped.setup_complete === false) {
        window.location.replace('/setup');
        throw 0;
      }
      const dek = await getSessionDEK();
      if (dek === null) {
        window.location.replace('/unlock');
        throw 0;
      }
      document.getElementById('signed-in').textContent = 'Signed in as ' + me.username;
      document.getElementById('vault-line').style.display = 'block';
      document.getElementById('content').style.display = 'block';
    } catch (e) {
      if (e !== 0) window.location.replace('/');
    }
  </script>
</body>
</html>
