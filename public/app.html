<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111111">
  <title>Billy — App</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
      background: #fafafa;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    main { max-width: 560px; width: 100%; text-align: center; }
    h1 { font-size: 24px; font-weight: 600; margin: 0 0 12px; letter-spacing: -0.02em; }
    h3 { font-size: 19px; font-weight: 600; margin: 0 0 8px; letter-spacing: -0.01em; }
    p { font-size: 16px; line-height: 1.5; color: #555; margin: 0 0 16px; }
    a { color: #111; font-size: 13px; }
    input[type="text"], input[type="password"], textarea {
      width: 100%; padding: 11px 12px; font-size: 15px; border: 1px solid #ddd;
      border-radius: 8px; margin: 0 0 10px; background: #fff; color: #111;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    textarea { resize: vertical; min-height: 64px; text-align: left; }
    button {
      padding: 12px 20px; background: #111; color: #fff; border: 0; border-radius: 8px;
      font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit;
    }
    button:hover:not(:disabled) { background: #000; }
    button:disabled { background: #999; cursor: not-allowed; }
    .row { display: flex; gap: 8px; align-items: center; justify-content: center; flex-wrap: wrap; }
    .toggle { background: transparent; color: #555; border: 1px solid #ddd; padding: 11px 12px; }
    .toggle:hover:not(:disabled) { background: #f0f0f0; }
    .toggle.active { background: #111; color: #fff; border-color: #111; }
    .err { color: #b00020; font-size: 14px; margin: 8px 0 12px; }
    .status { color: #888; font-size: 14px; margin: 8px 0 0; }
    .connected { color: #1a7f37; font-size: 14px; margin-top: 8px; }
    .view { display: none; }
    .view.active { display: block; }
    .cap-state { display: none; }
    .cap-state.active { display: block; }
    .hidden { display: none; }
    .mode-toggle { margin: 0 0 20px; }
    #loading { color: #888; font-size: 14px; }
    .small { font-size: 13px; margin-top: 18px; }
    .messages {
      text-align: left; max-height: 50vh; overflow-y: auto; border: 1px solid #eee;
      border-radius: 10px; padding: 12px; background: #fff; margin: 0 0 12px;
    }
    .msg { margin: 0 0 12px; }
    .msg:last-child { margin-bottom: 0; }
    .who { font-size: 12px; font-weight: 600; color: #999; margin-bottom: 2px; }
    .msg-body { font-size: 15px; line-height: 1.5; color: #222; white-space: pre-wrap; }
    .msg-billy .msg-body { color: #111; }
    .memo-card { text-align: left; border: 1px solid #e2e2e2; border-radius: 12px; padding: 18px; background: #fff; margin: 0 0 14px; }
    .bucket { display: inline-block; font-size: 12px; font-weight: 600; color: #444; border: 1px solid #ccc; border-radius: 999px; padding: 2px 10px; margin: 0 0 12px; }
    .memo-body { font-size: 15px; line-height: 1.55; color: #222; white-space: pre-wrap; margin: 0 0 12px; }
    .memo-summary { font-size: 13px; font-style: italic; color: #777; margin: 0 0 8px; }
    .memo-tags { font-size: 13px; color: #555; margin: 0 0 8px; }
    .memo-time { font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <main>
    <div id="loading">Loading…</div>

    <section id="onboardView" class="view">
      <h1>Connect your Anthropic API key</h1>
      <p>Billy uses your own Anthropic key. It's encrypted on your device and we only
        ever store the ciphertext — never the key itself.</p>
      <div class="row">
        <input id="keyInput" type="password" autocomplete="off" autocapitalize="none"
               spellcheck="false" placeholder="sk-ant-...">
        <button id="toggleKey" class="toggle" type="button">Show</button>
      </div>
      <div><button id="saveBtn" disabled>Validate &amp; save</button></div>
      <p id="onboardStatus" class="status" style="display:none"></p>
      <p id="onboardErr" class="err" style="display:none"></p>
    </section>

    <section id="captureView" class="view">
      <!-- Mode toggle (Capture | Retrieve). Lives inside #captureView, so it is
           only ever visible in the onboarded+unlocked surface; the onboarding
           key-paste view (#onboardView) never shows it. Capture is active on every
           load of /app; last-used mode is intentionally not persisted in 3.1. -->
      <div class="row mode-toggle" id="modeToggle">
        <button id="modeCaptureBtn" class="toggle active" type="button" aria-pressed="true">Capture</button>
        <button id="modeRetrieveBtn" class="toggle" type="button" aria-pressed="false">Retrieve</button>
      </div>

      <!-- Capture surface, wrapped only. Its markup, element IDs and event
           bindings are unchanged; the wrapper just lets it be hidden/shown on a
           mode switch without ever being destroyed or re-rendered. -->
      <div id="capture-mode">
      <div id="st-entry" class="cap-state">
        <h1>Billy — you're set up.</h1>
        <p id="connectedLine" class="connected" style="display:none">Anthropic key connected ✓</p>
        <div><button id="startBtn">Start capture</button></div>
        <p class="small"><a id="signout" href="/api/auth/logout">Sign out</a></p>
      </div>

      <div id="st-capturing" class="cap-state">
        <div id="messages" class="messages"></div>
        <textarea id="captureInput" rows="3"
          placeholder="Type your thought… (Enter to send, Shift+Enter for a newline)"></textarea>
        <div class="row">
          <button id="sendBtn">Send</button>
          <button id="endBtn" disabled>End conversation &amp; synthesize</button>
        </div>
        <p class="small"><a id="cancelLink" href="#">Cancel</a></p>
      </div>

      <div id="st-synthesizing" class="cap-state">
        <p>Synthesizing your memo…</p>
      </div>

      <div id="st-memo" class="cap-state">
        <div id="memoCard" class="memo-card"></div>
        <p id="saveErr" class="err" style="display:none"></p>
        <div class="row">
          <button id="saveMemoBtn">Save memo</button>
          <button id="discardBtn">Discard &amp; new capture</button>
        </div>
      </div>

      <div id="st-saved" class="cap-state">
        <div id="savedCard" class="memo-card"></div>
        <p class="connected">Saved ✓</p>
        <p id="embedStatus" class="small" style="display:none"></p>
        <p id="blobStatus" class="small" style="display:none"></p>
        <div><button id="captureAgainBtn">Capture again</button></div>
      </div>

      <div id="st-error" class="cap-state">
        <p id="errorMsg" class="err"></p>
        <div><button id="retryBtn" style="display:none">Retry</button></div>
        <p class="small"><a id="errBack" href="#">Back</a></p>
      </div>
      </div>

      <!-- Retrieve surface. Hidden by default (Capture is the default mode).
           Mounted lazily on first switch to Retrieve via dynamic import. -->
      <div id="retrieve-mode" class="hidden"></div>
    </section>
  </main>

  <script type="module">
    import { getSessionDEK, clearSessionDEK } from '/crypto/session-dek.js';
    import { encryptStringWithDEK, decryptStringWithDEK } from '/crypto/dek.js';
    import { BILLY_MODEL, callLLM } from './lib/llm.js';
    import { setAnthropicKey, getAnthropicKey, clearAnthropicKey } from './lib/session.js';
    import { loadCapturePromptV1 } from './lib/prompts-loader.js';
    import { saveMemo, saveEmbedding, fetchOtherEmbeddings, saveConnectionBlob } from './lib/memos.js';
    import {
      startLoadingEmbeddingModel,
      isEmbeddingModelReady,
      embedMemo,
      base64ToFloat32Array,
      topKNeighbors,
      SCORING_FN_VERSION,
      EMBEDDING_MODEL_VERSION
    } from './lib/embeddings.js';

    const loading = document.getElementById('loading');
    const onboardView = document.getElementById('onboardView');
    const captureView = document.getElementById('captureView');

    function show(view) {
      loading.style.display = 'none';
      onboardView.classList.remove('active');
      captureView.classList.remove('active');
      view.classList.add('active');
    }

    // ----- Capture flow -----
    const capStates = {
      entry: document.getElementById('st-entry'),
      capturing: document.getElementById('st-capturing'),
      synthesizing: document.getElementById('st-synthesizing'),
      memo: document.getElementById('st-memo'),
      saved: document.getElementById('st-saved'),
      error: document.getElementById('st-error')
    };
    const connectedLine = document.getElementById('connectedLine');
    const messagesEl = document.getElementById('messages');
    const captureInput = document.getElementById('captureInput');
    const sendBtn = document.getElementById('sendBtn');
    const endBtn = document.getElementById('endBtn');
    const memoCardEl = document.getElementById('memoCard');
    const savedCardEl = document.getElementById('savedCard');
    const embedStatusEl = document.getElementById('embedStatus');
    const blobStatusEl = document.getElementById('blobStatus');
    const saveMemoBtn = document.getElementById('saveMemoBtn');
    const saveErr = document.getElementById('saveErr');
    const errorMsgEl = document.getElementById('errorMsg');
    const retryBtn = document.getElementById('retryBtn');

    let history = [];
    let companionPrompt = null;
    let synthesisPrompt = null;
    let pendingRetry = null;
    let captureContext = null;

    function setCaptureState(s) {
      for (const k in capStates) capStates[k].classList.remove('active');
      capStates[s].classList.add('active');
    }

    function enterEntry() {
      history = [];
      captureContext = null;
      connectedLine.style.display = getAnthropicKey() ? 'block' : 'none';
      setCaptureState('entry');
      show(captureView);
    }

    function renderMessages() {
      messagesEl.innerHTML = '';
      for (const m of history) {
        const wrap = document.createElement('div');
        wrap.className = 'msg ' + (m.role === 'user' ? 'msg-user' : 'msg-billy');
        const who = document.createElement('div');
        who.className = 'who';
        who.textContent = m.role === 'user' ? 'You' : 'Billy';
        const body = document.createElement('div');
        body.className = 'msg-body';
        body.textContent = m.content; // textContent: never interpret model/user text as HTML
        wrap.appendChild(who);
        wrap.appendChild(body);
        messagesEl.appendChild(wrap);
      }
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setControls(busy) {
      const hasUser = history.some(m => m.role === 'user');
      captureInput.disabled = busy;
      sendBtn.disabled = busy;
      endBtn.disabled = busy || !hasUser;
    }

    function errorInfo(code) {
      if (code === 'LLM_NO_KEY') return { msg: "Your Anthropic key isn't available — please sign out and back in.", retry: false };
      if (code === 'LLM_AUTH') return { msg: "Your Anthropic key was rejected. It may have been revoked or rotated.", retry: false };
      if (code === 'LLM_RATELIMIT') return { msg: "Rate-limited by Anthropic. Wait a moment and try again.", retry: true };
      if (code.startsWith('LLM_HTTP_')) return { msg: `Request failed (HTTP ${code.slice(9)}). Try again.`, retry: true };
      if (code.startsWith('PROMPT_FETCH_')) return { msg: `Couldn't load the capture prompt (HTTP ${code.slice(13)}). Refresh the page.`, retry: false };
      if (code === 'PROMPT_PARSE') return { msg: "Capture prompt file is malformed. Refresh; report if it persists.", retry: false };
      if (code === 'SYNTH_PARSE') return { msg: "Couldn't parse the synthesized memo. Try ending the conversation again.", retry: true };
      // Uncaught fetch rejection (network failure) surfaces here as a TypeError.
      return { msg: "Couldn't reach Anthropic — check your connection and try again.", retry: true };
    }

    function enterError(err, retryAction) {
      const code = (err && err.message) ? err.message : '';
      const info = errorInfo(code);
      errorMsgEl.textContent = info.msg;
      if (info.retry && retryAction) {
        pendingRetry = retryAction;
        retryBtn.style.display = 'inline-block';
      } else {
        pendingRetry = null;
        retryBtn.style.display = 'none';
      }
      setCaptureState('error');
    }

    async function startCapture() {
      // Begin loading the embedding model in parallel with the conversation.
      // Fire-and-forget: a load failure must not break capture (embedding is a follow-up).
      startLoadingEmbeddingModel().catch(err => console.warn('[embeddings] background load failed:', err));
      try {
        const p = await loadCapturePromptV1();
        companionPrompt = p.companion;
        synthesisPrompt = p.synthesis;
      } catch (err) {
        enterError(err, null);
        return;
      }
      history = [];
      renderMessages();
      setCaptureState('capturing');
      setControls(false);
      captureInput.focus();
    }

    async function requestAssistantReply() {
      setCaptureState('capturing');
      renderMessages();
      setControls(true);
      try {
        const billyText = await callLLM({ messages: history, system: companionPrompt });
        history.push({ role: 'assistant', content: billyText });
        renderMessages();
        setControls(false);
        captureInput.focus();
      } catch (err) {
        enterError(err, requestAssistantReply);
      }
    }

    function doSend() {
      if (captureInput.disabled) return;
      const text = captureInput.value.trim();
      if (!text) return;
      history.push({ role: 'user', content: text });
      captureInput.value = '';
      renderMessages();
      requestAssistantReply();
    }

    async function doSynthesize() {
      setCaptureState('synthesizing');
      try {
        const transcript = history.map(m => `${m.role === 'user' ? 'User' : 'Billy'}: ${m.content}`).join('\n\n');
        const synthMessages = [{
          role: 'user',
          content: `Conversation transcript:\n\n${transcript}\n\nExisting canonical tag vocabulary: []\n\nOutput the Memo as bare JSON, no preamble.`
        }];
        const out = await callLLM({ messages: synthMessages, system: synthesisPrompt, maxTokens: 4096 });
        let memo;
        try {
          memo = JSON.parse(out);
        } catch {
          enterError(new Error('SYNTH_PARSE'), doSynthesize);
          return;
        }
        captureContext = { memo, promptVersion: 'lifeos-capture-v1' };
        saveErr.style.display = 'none';
        saveMemoBtn.disabled = false;
        saveMemoBtn.textContent = 'Save memo';
        renderMemo(memo, memoCardEl);
        setCaptureState('memo');
      } catch (err) {
        enterError(err, doSynthesize);
      }
    }

    function renderMemo(memo, target) {
      const memoCardEl = target;
      memoCardEl.innerHTML = '';

      const h3 = document.createElement('h3');
      h3.textContent = memo.title || '';
      memoCardEl.appendChild(h3);

      if (memo.para_bucket) {
        const bucket = document.createElement('span');
        bucket.className = 'bucket';
        bucket.textContent = memo.para_bucket;
        memoCardEl.appendChild(bucket);
      }

      const body = document.createElement('div');
      body.className = 'memo-body';
      body.textContent = memo.body || '';
      memoCardEl.appendChild(body);

      if (memo.summary) {
        const summary = document.createElement('div');
        summary.className = 'memo-summary';
        summary.textContent = memo.summary;
        memoCardEl.appendChild(summary);
      }

      if (Array.isArray(memo.tags) && memo.tags.length > 0) {
        const tags = document.createElement('div');
        tags.className = 'memo-tags';
        tags.textContent = memo.tags.join(' · ');
        memoCardEl.appendChild(tags);
      }

      if (memo.time_reference !== null && memo.time_reference !== undefined && memo.time_reference !== '') {
        const time = document.createElement('div');
        time.className = 'memo-time';
        time.textContent = 'Time: ' + memo.time_reference;
        memoCardEl.appendChild(time);
      }
    }

    function showEmbeddingStatus(state) {
      const map = {
        embedding: { text: 'Embedding…', color: '#888' },
        embedded: { text: 'Embedded ✓', color: '#1a7f37' },
        pending: { text: 'Embedding pending — will retry', color: '#b8860b' }
      };
      const s = map[state];
      if (!s) { embedStatusEl.style.display = 'none'; return; }
      embedStatusEl.textContent = s.text;
      embedStatusEl.style.color = s.color;
      embedStatusEl.style.display = 'block';
    }

    function showBlobStatus(state, n) {
      let text, color;
      if (state === 'connecting') { text = 'Connecting…'; color = '#888'; }
      else if (state === 'connected') {
        text = (n && n > 0) ? `Connected to ${n} neighbor(s) ✓` : 'Connected (first memo) ✓';
        color = '#1a7f37';
      } else if (state === 'pending') { text = 'Connection pending — will retry'; color = '#b8860b'; }
      else { blobStatusEl.style.display = 'none'; return; }
      blobStatusEl.textContent = text;
      blobStatusEl.style.color = color;
      blobStatusEl.style.display = 'block';
    }

    async function embedAndConnectAndSave(memoId, memo) {
      showEmbeddingStatus('embedding');
      let vec;
      try {
        vec = await embedMemo(memo);
        await saveEmbedding(memoId, vec, EMBEDDING_MODEL_VERSION);
        showEmbeddingStatus('embedded');
      } catch (err) {
        console.warn('[embeddings] failed:', err);
        showEmbeddingStatus('pending');
        return; // No point computing the blob without an embedding for the new memo.
      }

      // Now compute the connection blob.
      showBlobStatus('connecting');
      try {
        const others = await fetchOtherEmbeddings(memoId);

        if (others.length === 0) {
          // First memo for this user; empty neighbors array is correct.
          const blob = { neighbors: [], scoring_fn_version: SCORING_FN_VERSION };
          await saveConnectionBlob(memoId, blob, SCORING_FN_VERSION);
          showBlobStatus('connected', 0);
          return;
        }

        // Decrypt each other memo's embedding. If any decrypt fails, skip that one
        // (it's a corrupted row, not a fatal error for this memo).
        const dek = await getSessionDEK();
        if (!dek) { showBlobStatus('pending'); return; }

        const neighbors = [];
        for (const m of others) {
          try {
            const plaintext_b64 = await decryptStringWithDEK(m.embedding_ciphertext, m.embedding_iv, dek);
            const otherVec = base64ToFloat32Array(plaintext_b64);
            neighbors.push({ id: m.id, vec: otherVec });
          } catch (decryptErr) {
            console.warn('[blob] decrypt failed for memo', m.id, decryptErr);
            // Skip this one. The blob remains valid with fewer neighbors.
          }
        }

        const top = topKNeighbors(vec, neighbors);
        const blob = { neighbors: top, scoring_fn_version: SCORING_FN_VERSION };
        await saveConnectionBlob(memoId, blob, SCORING_FN_VERSION);
        showBlobStatus('connected', top.length);
      } catch (err) {
        console.warn('[blob] failed:', err);
        showBlobStatus('pending');
      }
    }

    function showSaveError(err) {
      const code = (err && err.message) ? err.message : '';
      let msg;
      if (code === 'MEMO_NO_DEK' || code === 'MEMO_AUTH') {
        msg = 'Your session expired. Please re-unlock.';
      } else if (code.startsWith('MEMO_BAD_INPUT_')) {
        msg = `Memo failed validation (${code.slice(15)}). Report if it persists.`;
      } else if (code === 'MEMO_ID_CONFLICT') {
        msg = 'Save failed twice with ID conflict — try again.';
      } else if (code.startsWith('MEMO_HTTP_')) {
        msg = `Save failed (HTTP ${code.slice(10)}). Try again.`;
      } else {
        msg = 'Save failed — check your connection and try again.';
      }
      saveErr.textContent = msg;
      saveErr.style.display = 'block';
    }

    async function doSaveMemo() {
      if (!captureContext || saveMemoBtn.disabled) return;
      saveErr.style.display = 'none';
      saveMemoBtn.disabled = true;
      saveMemoBtn.textContent = 'Saving…';
      try {
        let saved;
        try {
          saved = await saveMemo(captureContext.memo, captureContext.promptVersion);
        } catch (err) {
          // Transparent single retry with a fresh UUID (saveMemo mints a new one each call).
          if (err && err.message === 'MEMO_ID_CONFLICT') {
            saved = await saveMemo(captureContext.memo, captureContext.promptVersion);
          } else {
            throw err;
          }
        }
        renderMemo(captureContext.memo, savedCardEl);
        showEmbeddingStatus(null);
        showBlobStatus(null);
        setCaptureState('saved');
        // Embedding + connection-blob run AFTER the visible "Saved ✓" so they never block perceived save.
        embedAndConnectAndSave(saved.id, captureContext.memo);
      } catch (err) {
        saveMemoBtn.disabled = false;
        saveMemoBtn.textContent = 'Save memo';
        showSaveError(err);
      }
    }

    // Capture listeners (wired once; elements always present in the DOM).
    document.getElementById('startBtn').addEventListener('click', startCapture);
    saveMemoBtn.addEventListener('click', doSaveMemo);
    document.getElementById('captureAgainBtn').addEventListener('click', enterEntry);
    sendBtn.addEventListener('click', doSend);
    endBtn.addEventListener('click', () => { if (!endBtn.disabled) doSynthesize(); });
    captureInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
    });
    document.getElementById('cancelLink').addEventListener('click', (e) => { e.preventDefault(); enterEntry(); });
    document.getElementById('discardBtn').addEventListener('click', enterEntry);
    document.getElementById('errBack').addEventListener('click', (e) => { e.preventDefault(); enterEntry(); });
    retryBtn.addEventListener('click', () => { if (pendingRetry) pendingRetry(); });

    document.getElementById('signout').addEventListener('click', (e) => {
      e.preventDefault();
      clearAnthropicKey();
      clearSessionDEK();
      window.location.href = '/api/auth/logout';
    });

    // ----- Mode toggle (Capture | Retrieve) -----
    // Switching only hides/shows the two wrappers — it never destroys or
    // re-renders the capture DOM, so capture state survives a round-trip.
    // Retrieve is mounted lazily on first selection; nothing here touches the
    // key, the DEK, the embedding model, the LLM, or the network.
    const modeCaptureBtn = document.getElementById('modeCaptureBtn');
    const modeRetrieveBtn = document.getElementById('modeRetrieveBtn');
    const captureModeView = document.getElementById('capture-mode');
    const retrieveModeView = document.getElementById('retrieve-mode');
    let retrieveMounted = false;

    function showCaptureMode() {
      retrieveModeView.classList.add('hidden');
      captureModeView.classList.remove('hidden');
      modeRetrieveBtn.classList.remove('active');
      modeRetrieveBtn.setAttribute('aria-pressed', 'false');
      modeCaptureBtn.classList.add('active');
      modeCaptureBtn.setAttribute('aria-pressed', 'true');
    }

    async function showRetrieveMode() {
      modeCaptureBtn.classList.remove('active');
      modeCaptureBtn.setAttribute('aria-pressed', 'false');
      modeRetrieveBtn.classList.add('active');
      modeRetrieveBtn.setAttribute('aria-pressed', 'true');
      captureModeView.classList.add('hidden');
      retrieveModeView.classList.remove('hidden');
      if (retrieveMounted) return;          // already imported + mounted: just show it
      retrieveMounted = true;               // set before await so a rapid 2nd click can't double-mount
      try {
        const mod = await import('/lib/retrieve/retrieve-ui.js');
        mod.mountRetrieve(retrieveModeView);
      } catch (err) {
        retrieveMounted = false;            // allow a retry on a later switch
        retrieveModeView.innerHTML = '';    // never leave the panel blank
        const p = document.createElement('p');
        p.className = 'err';
        p.textContent = "Couldn't load Retrieve. Refresh and try again.";
        retrieveModeView.appendChild(p);
      }
    }

    modeCaptureBtn.addEventListener('click', showCaptureMode);
    modeRetrieveBtn.addEventListener('click', showRetrieveMode);

    // ----- Load flow -----
    let dek = null;
    let wrapped = null;

    try {
      const me = await fetch('/api/me', { credentials: 'same-origin' }).then(r => r.json());
      if (!me || !me.authenticated) { window.location.replace('/'); throw 0; }

      wrapped = await fetch('/api/crypto/get-wrapped', { credentials: 'same-origin' }).then(r => r.json());
      if (wrapped && wrapped.setup_complete === false) { window.location.replace('/setup'); throw 0; }

      dek = await getSessionDEK();
      if (dek === null) { window.location.replace('/unlock'); throw 0; }
    } catch (e) {
      if (e !== 0) { loading.textContent = 'Failed to load. Refresh to retry.'; }
      throw e;
    }

    // Already onboarded: decrypt the wrapped key into memory and skip the prompt.
    if (wrapped.onboarding_complete && wrapped.anthropic_key_wrapped && wrapped.anthropic_key_iv) {
      try {
        const plain = await decryptStringWithDEK(
          wrapped.anthropic_key_wrapped,
          wrapped.anthropic_key_iv,
          dek
        );
        setAnthropicKey(plain);
        enterEntry();
      } catch {
        // Wrapped key present but undecryptable with this DEK — fall back to onboarding.
        clearAnthropicKey();
        setupOnboarding();
      }
    } else {
      setupOnboarding();
    }

    function setupOnboarding() {
      const keyInput = document.getElementById('keyInput');
      const saveBtn = document.getElementById('saveBtn');
      const toggleKey = document.getElementById('toggleKey');
      const statusEl = document.getElementById('onboardStatus');
      const errEl = document.getElementById('onboardErr');

      keyInput.addEventListener('input', () => {
        saveBtn.disabled = keyInput.value.trim().length === 0;
      });

      toggleKey.addEventListener('click', () => {
        const showing = keyInput.type === 'text';
        keyInput.type = showing ? 'password' : 'text';
        toggleKey.textContent = showing ? 'Show' : 'Hide';
      });

      async function validateAndSave() {
        const key = keyInput.value.trim();
        if (!key) return;
        errEl.style.display = 'none';
        statusEl.style.display = 'block';
        statusEl.textContent = 'Validating against ' + BILLY_MODEL + '…';
        saveBtn.disabled = true;

        // Validate with a real, minimal call DIRECTLY from the browser to Anthropic.
        // This is a credentials check, not a brain-layer call — it stays a direct fetch,
        // not routed through callLLM. The plaintext key never touches our server.
        let r;
        try {
          r = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
              'content-type': 'application/json',
              'x-api-key': key,
              'anthropic-version': '2023-06-01',
              'anthropic-dangerous-direct-browser-access': 'true'
            },
            body: JSON.stringify({
              model: BILLY_MODEL,
              max_tokens: 1,
              messages: [{ role: 'user', content: 'hi' }]
            })
          });
        } catch {
          statusEl.style.display = 'none';
          errEl.textContent = "Couldn't validate the key (network error) — check your connection and try again.";
          errEl.style.display = 'block';
          saveBtn.disabled = keyInput.value.trim().length === 0;
          return;
        }

        if (r.status === 401 || r.status === 403) {
          statusEl.style.display = 'none';
          errEl.textContent = 'That API key was rejected — check it and try again.';
          errEl.style.display = 'block';
          saveBtn.disabled = keyInput.value.trim().length === 0;
          return;
        }

        if (!r.ok) {
          statusEl.style.display = 'none';
          errEl.textContent = "Couldn't validate the key (status " + r.status + ") — check your connection and try again.";
          errEl.style.display = 'block';
          saveBtn.disabled = keyInput.value.trim().length === 0;
          return;
        }

        // Valid key. Encrypt with the DEK and persist ONLY the ciphertext.
        statusEl.textContent = 'Saving…';
        let saveRes;
        try {
          const { ciphertext_b64, iv_b64 } = await encryptStringWithDEK(key, dek);
          saveRes = await fetch('/api/account/set-anthropic-key', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({
              anthropic_key_wrapped: ciphertext_b64,
              anthropic_key_iv: iv_b64
            })
          });
        } catch {
          statusEl.style.display = 'none';
          errEl.textContent = "Couldn't save the key — check your connection and try again.";
          errEl.style.display = 'block';
          saveBtn.disabled = keyInput.value.trim().length === 0;
          return;
        }

        if (!saveRes.ok) {
          statusEl.style.display = 'none';
          errEl.textContent = "Couldn't save the key (status " + saveRes.status + ") — please try again.";
          errEl.style.display = 'block';
          saveBtn.disabled = keyInput.value.trim().length === 0;
          return;
        }

        // Keep plaintext key in module memory only; route to the capture entry.
        setAnthropicKey(key);
        keyInput.value = '';
        enterEntry();
      }

      saveBtn.addEventListener('click', validateAndSave);
      keyInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !saveBtn.disabled) validateAndSave();
      });

      show(onboardView);
    }
  </script>
</body>
</html>
