<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111111">
  <title>Billy — App</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
      background: #fafafa;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    main {
      max-width: 480px;
      text-align: center;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin: 0 0 12px;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 16px;
      line-height: 1.5;
      color: #555;
      margin: 0 0 16px;
    }
    a { color: #111; }
    #content { display: none; }
  </style>
</head>
<body>
  <main id="content">
    <h1 id="signed-in">Signed in</h1>
    <p>Account identity established. Milestone 1.2.</p>
    <p><a href="/api/auth/logout">Sign out</a></p>
  </main>
  <script>
    fetch('/api/me', { credentials: 'same-origin' })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (!data || !data.authenticated) {
          window.location.replace('/');
          return;
        }
        document.getElementById('signed-in').textContent = 'Signed in as ' + data.email;
        document.getElementById('content').style.display = 'block';
      })
      .catch(function () {
        window.location.replace('/');
      });
  </script>
</body>
</html>
