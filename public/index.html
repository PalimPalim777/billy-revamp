<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111111">
  <title>Billy</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
      background: #fafafa;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    main {
      max-width: 480px;
      text-align: center;
    }
    h1 {
      font-size: 32px;
      font-weight: 600;
      margin: 0 0 12px;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 16px;
      line-height: 1.5;
      color: #555;
      margin: 0 0 24px;
    }
    .btn {
      display: inline-block;
      padding: 12px 20px;
      background: #111;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
    }
    .btn:hover { background: #000; }
  </style>
</head>
<body>
  <main>
    <h1>Billy</h1>
    <p>Multi-user revamp</p>
    <a class="btn" href="/api/auth/google/start">Sign in with Google</a>
  </main>
  <script>
    fetch('/api/me', { credentials: 'same-origin' })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (!data || !data.authenticated) return;
        return fetch('/api/crypto/get-wrapped', { credentials: 'same-origin' })
          .then(function (r) { return r.json(); })
          .then(function (w) {
            if (w && w.setup_complete === false) {
              window.location.replace('/setup');
            } else {
              window.location.replace('/app');
            }
          });
      })
      .catch(function () {});
  </script>
</body>
</html>
