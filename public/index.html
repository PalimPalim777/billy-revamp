<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Billy">
  <link rel="apple-touch-icon" href="/icons/billy-180.png">
  <link rel="icon" href="/icons/billy.svg" type="image/svg+xml">
  <title>Billy</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
      background: #fafafa;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    main {
      max-width: 480px;
      text-align: center;
    }
    h1 {
      font-size: 32px;
      font-weight: 600;
      margin: 0 0 12px;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 16px;
      line-height: 1.5;
      color: #555;
      margin: 0 0 24px;
    }
    .cta-row {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .btn {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      flex: 1;
      max-width: 160px;
    }
    .btn-primary {
      background: #111;
      color: #fff;
    }
    .btn-primary:hover { background: #000; }
    .btn-secondary {
      background: #fff;
      color: #111;
      border: 1px solid #ddd;
    }
    .btn-secondary:hover { background: #f0f0f0; }
  </style>
  <link rel="stylesheet" href="/styles/foundation.css">
</head>
<body>
  <main>
    <h1>Billy</h1>
    <p>Multi-user revamp</p>
    <div class="cta-row">
      <a class="btn btn-primary" href="/signup">Sign up</a>
      <a class="btn btn-secondary" href="/login">Sign in</a>
    </div>
  </main>
  <script>
    fetch('/api/me', { credentials: 'same-origin' })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (!data || !data.authenticated) return;
        return fetch('/api/crypto/get-wrapped', { credentials: 'same-origin' })
          .then(function (r) { return r.json(); })
          .then(function (w) {
            if (w && w.setup_complete === false) {
              window.location.replace('/setup');
            } else {
              window.location.replace('/app');
            }
          });
      })
      .catch(function () {});
  </script>
</body>
</html>
